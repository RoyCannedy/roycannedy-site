<!DOCTYPE html>

<head>

  <title>Baylor Faith Survey</title>

  <!-- ============================================================
       FAITH SURVEY SCROLLYTELLING
       ------------------------------------------------------------
       This file is organized into clearly labeled sections so it is
       easy to edit later. The main sections are:

         1. THEME       -> colors, typography, sizing (CSS :root)
         2. LAYOUT CSS  -> page structure and step cards
         3. CHART CSS   -> shared styling for every chart
         4. DATA        -> all survey numbers in one object
         5. NARRATIVE   -> all on-screen text (eyebrow, h1, steps, footer)
         6. CHART CONFIG-> titles + subtitles for each step
         7. CHART CODE  -> the small set of reusable drawing functions
         8. CONTROLLER  -> the scroll observer that ties it together

       To change a color   -> edit section 1 (THEME).
       To change wording   -> edit section 5 (NARRATIVE) or 6 (CHART CONFIG).
       To swap a graph     -> edit the render() switch in section 8 and
                              point a step's data-view at a new function.
       ============================================================ -->

  <style>
    /* ============================================================
       1. THEME - colors, typography, sizing
       Edit anything here to restyle the whole presentation.
       ============================================================ */
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Nunito:wght@400;600&display=swap');
    :root {
      /* Fonts */
      --font-display: 'Manrope', system-ui, sans-serif;
      --font-body:    'Nunito', system-ui, sans-serif;
      /* Page surfaces */
      --bg-cream:        #d9eef7;   /* main page background */
      --bg-card:         #ffffff;   /* step + chart card background */
      --bg-hero-dark:    #020617;   /* hero gradient, dark end */
      --bg-hero-mid:     #111827;   /* hero gradient, mid */
      --bg-hero-glow:    #334155;   /* hero radial glow */
      --bg-footer:       #020617;   /* footer */

      /* Text */
      --ink-strong:      #111827;   /* headlines */
      --ink-body:        #334155;   /* body copy */
      --ink-muted:       #64748b;   /* subtitles, captions */
      --ink-onDark:      #ffffff;   /* text on dark backgrounds */
      --ink-onDark-soft: #cbd5e1;   /* secondary text on dark */

      /* Lines + axes */
      --line-soft:       #e5e7eb;   /* gridlines, card borders */
      --line-axis:       #475569;   /* axis labels */

      /* Categorical palette - used for most multi-series charts.
         The ORDER matters: chart series are colored in this order. */
      --c1: #2563eb;   /* blue   */
      --c2: #f5a3b7;   /* pink   */
      --c3: #10b981;   /* green  */
      --c4: #f97316;   /* orange */
      --c5: #8b5cf6;   /* purple */
      --c6: #ef4444;   /* red    */
      --c7: #14b8a6;   /* teal   */
      --c8: #64748b;   /* slate  */

      /* Gender colors - used everywhere we split Male / Female */
      --gender-female:   #e11d48;   /* rose  */
      --gender-male:     #2563eb;   /* blue  */

      /* Type scale */
      --fs-h1:        clamp(3rem, 8vw, 6.5rem);
      --fs-step-h2:   clamp(1.7rem, 3vw, 2.55rem);
      --fs-viz-title: 1.35rem;       /* chart titles - larger for projection */
      --fs-viz-sub:   0.95rem;       /* chart subtitles */
      --fs-axis:      12px;          /* axis tick labels */
      --fs-bar-label: 12px;          /* bar / data labels */
      --fs-legend:    1rem;
    }

    * { box-sizing: border-box; }

    /* ============================================================
       2. LAYOUT CSS - page structure
       ============================================================ */
    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--bg-cream);
      color: var(--ink-strong);
      -webkit-font-smoothing: antialiased;
    }

    /* Hero / title section */
    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 22px;
      color: var(--ink-onDark);
      background:
        radial-gradient(circle at 20% 20%, var(--bg-hero-glow), transparent 32%),
        linear-gradient(135deg, var(--bg-hero-dark), var(--bg-hero-mid) 60%, #1e293b);
    }
    .hero-inner { max-width: 1050px; }
    .eyebrow {
      color: var(--ink-onDark-soft);
      letter-spacing: .16em;
      text-transform: uppercase;
      font-size: .85rem;
      font-weight: 800;
    }
    h1 {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: var(--fs-h1);
      line-height: .92;
      margin: 18px 0;
      max-width: 980px;
      letter-spacing: -0.02em;
    }
    .hero p {
      font-size: clamp(1.1rem, 2vw, 1.45rem);
      max-width: 780px;
      color: #dbe4ee;
    }

    /* Hero stat cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-top: 34px;
      max-width: 900px;
    }
    .stat {
      padding: 18px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 22px;
      background: rgba(255,255,255,.08);
    }
    .stat strong {
      display: block;
      font-size: 2.2rem;
      font-family: var(--font-display);
    }
    .stat span {
      color: var(--ink-onDark-soft);
      font-size: .9rem;
    }

    /* Scrollytelling layout - left column = steps, right column = sticky chart */
    .scrolly {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 40% 1fr;
      gap: 30px;
      padding: 70px 24px;
    }
    .steps {
      display: flex;
      flex-direction: column;
      gap: 72vh;
      padding-bottom: 50vh;
    }

    /* Individual step card - inactive cards fade back */
    .step {
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(15,23,42,.08);
      opacity: .33;
      transform: translateY(14px);
      transition: opacity .3s ease, transform .3s ease;
    }
    .step.active { opacity: 1; transform: translateY(0); }
    .step .num {
      color: var(--c1);
      font-weight: 900;
      letter-spacing: .13em;
      font-size: .78rem;
      text-transform: uppercase;
    }
    .step h2 {
      font-family: var(--font-display);
      font-size: var(--fs-step-h2);
      line-height: 1.05;
      margin: 10px 0 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .step p {
      margin: 0;
      color: var(--ink-body);
      font-size: 1.06rem;
      line-height: 1.55;
    }

    /* Sticky chart panel on the right */
    .visual {
      position: sticky;
      top: 24px;
      height: calc(100vh - 48px);
      display: grid;
      place-items: center;
    }
    .viz-card {
      width: 100%;
      min-height: 650px;
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line-soft);
      border-radius: 32px;
      padding: 30px 30px 48px;
      box-shadow: 0 24px 70px rgba(15,23,42,.16);
    }

    /* ============================================================
       3. CHART CSS - shared styles for every chart
       ============================================================ */
    #viz {
      transition: opacity 0.2s ease, transform 0.2s ease;    
    }   
    .viz-title {
      font-family: var(--font-display);
      font-size: var(--fs-viz-title);
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .viz-sub {
      color: var(--ink-muted);
      margin-bottom: 22px;
      font-size: var(--fs-viz-sub);
    }
    svg { width: 100%; height: 460px; overflow: visible; }
    .axis text { fill: var(--line-axis); font-size: var(--fs-axis); font-weight: 500; }
    .axis line, .axis path { stroke: #cbd5e1; }
    .bar-label { font-size: var(--fs-bar-label); fill: var(--ink-body); font-weight: 500; }
    .legend {
      display: flex;
      gap: 12px 18px;
      flex-wrap: wrap;
      margin-top: 12px;
      font-size: 0.92rem;        
      color: var(--ink-body);
    }
    .legend span {
      display: inline-flex;
      align-items: center;
      max-width: 100%;         
    }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      vertical-align: -2px;
    }

    /* Tooltip floats above mouse position */
    .tooltip {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -115%);
      background: #0f172a;
      color: white;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: .9rem;
      line-height: 1.35;
      box-shadow: 0 14px 35px rgba(15,23,42,.25);
      z-index: 999;
      transition: opacity .12s ease;
      max-width: 260px;
    }
    .tooltip strong { display: block; font-size: .95rem; margin-bottom: 2px; }

    /* Hover affordances on interactive shapes */
    .area-layer,
    .ternary-point,
    .bar-hover {
      cursor: pointer;
      transition: opacity .18s ease, filter .18s ease;
    }
    .area-layer:hover,
    .bar-hover:hover {
      opacity: .92;
      filter: drop-shadow(0 8px 14px rgba(15,23,42,.22));
    }
    .ternary-point:hover {
      opacity: 1;
      filter: drop-shadow(0 8px 14px rgba(15,23,42,.28));
    }

    /* Footer */
    footer {
      background: var(--bg-footer);
      color: var(--ink-onDark);
      padding: 80px 24px;
      text-align: center;
    }
    footer p {
      max-width: 760px;
      margin: 0 auto;
      color: var(--ink-onDark-soft);
      font-size: 1.15rem;
      line-height: 1.6;
    }

    /* Mobile: stack columns, release sticky chart */
    @media (max-width: 920px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .scrolly { grid-template-columns: 1fr; }
      .visual { position: relative; top: 0; height: auto; order: -1; }
      .steps { gap: 28px; padding-bottom: 0; }
      .viz-card { min-height: auto; }
      svg { height: 420px; }
    }
  </style>
</head>

  /* ==============================================================
     6. CHART CONFIG - title + subtitle for the right-hand panel
     Each key matches a step's `view` value.
     ============================================================== */
  const CHART_TITLES = {
    genderClass:    ["Gender Distribution by Classification",          "Horizontal stacked counts by class year"],
    ternary:        ["Community × Ministry × Mentorship",             "Each bubble is a group of students with a similar mix of supports"],
    classArea:      ["Faith Struggles by Class Year",                  "Grouped bars - read across each year"],
    genderArea:     ["Faith Struggles by Gender",                      "Counts within each gender"],
    struggle:       ["Biggest Faith Struggle This Semester",           "Raw response counts (N = 94)"],
    genderStruggle: ["Biggest Faith Struggle Split by Gender",                     "Proportion of answers within each gender"],
    confidence:     ["Confidence Sharing Faith",                       "Proportion of answers within each gender"],
    encouraged:     ["Where Do You Feel Most Spiritually Encouraged?", "Raw response counts"],
    encouragedBar:  ["Where Students Feel Most Spiritually Encouraged", "Raw response counts"],
    growth:         ["What Helps Students Grow?",                      "Raw response counts"],
    friendship:     ["Struggles by Closeness to Christian Community",  "Top half of responses = students who feel very connected"],
    training:       ["Which of the Following Do You Feel Least Equipped to Explain?"],
    outreach:       ["Are You Pouring into Non-Christian Friends?",    "Proportions by class year (top) and by gender (bottom)"],
    mentorship:     ["Do You Have Older Believer(s) Mentoring, Discipling, and Pouring Into You?",             "Raw response counts"]
  };

  /* ==============================================================
     7. CHART CODE - reusable drawing functions
     Each function takes data and writes SVG into #viz.
     ============================================================== */

  // ---- helpers ----------------------------------------------------
  const css = (varName) => getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  const PALETTE = ['--c1','--c2','--c3','--c4','--c5','--c6','--c7','--c8'].map(css);
  const GENDER_COLORS = { Female: css('--gender-female'), Male: css('--gender-male') };

  const viz     = document.getElementById("viz");
  const title   = document.getElementById("title");
  const sub     = document.getElementById("sub");
  const legend  = document.getElementById("legend");
  const tooltip = document.getElementById("tooltip");
  
  function showImage(src, altText = '') {
    viz.innerHTML = `
      <img
        src="${src}"
        alt="${altText}"
        style="width:100%; 
          height:100%; 
          max-height: 500px;
          object-fit:contain; 
          border-radius:16px;"
      />
    `;
  }

  function showTooltip(event, html) {
    tooltip.innerHTML = html;
    tooltip.style.left = event.clientX + "px";
    tooltip.style.top  = event.clientY + "px";
    tooltip.style.opacity = 1;
  }
  function moveTooltip(event) {
    tooltip.style.left = event.clientX + "px";
    tooltip.style.top  = event.clientY + "px";
  }
  function hideTooltip() { tooltip.style.opacity = 0; }

  function setTitles(view) {
    title.textContent = CHART_TITLES[view][0];
    sub.textContent   = CHART_TITLES[view][1];
    legend.innerHTML  = "";
  }

  function cleanLabel(s, max = 28) {
    return s.length > max ? s.slice(0, max - 2) + "…" : s;
  }

  function buildLegend(items) {
    // items: [{label, color}]
    legend.innerHTML = items
      .map(i => `<span><i class="dot" style="background:${i.color}"></i>${i.label}</span>`)
      .join("");
  }

  // ---- horizontal bar chart (single series) -----------------------
  function barChart(data) {
    const w = 720, h = 520, m = { top: 20, right: 50, bottom: 40, left: 250 };
    const max  = Math.max(...data.map(d => d.value));
    const yStep = (h - m.top - m.bottom) / data.length;
    let svg = `<svg viewBox="0 0 ${w} ${h}">`;

    // x gridlines + tick labels
    for (let i = 0; i <= 4; i++) {
      const x = m.left + (w - m.left - m.right) * (i / 4);
      svg += `<line x1="${x}" y1="${m.top}" x2="${x}" y2="${h - m.bottom}" stroke="${css('--line-soft')}"/>`;
      svg += `<text x="${x}" y="${h - 12}" text-anchor="middle" class="axis">${Math.round(max * i / 4)}</text>`;
    }

    // bars
    data.forEach((d, i) => {
      const y  = m.top + i * yStep + 8;
      const bw = (w - m.left - m.right) * (d.value / max);
      svg += `<text x="${m.left - 12}" y="${y + 18}" text-anchor="end" class="bar-label">${cleanLabel(d.label, 32)}</text>`;
      svg += `<rect x="${m.left}" y="${y}" width="${bw}" height="${Math.max(16, yStep - 14)}" rx="8" fill="${PALETTE[i % PALETTE.length]}"></rect>`;
      svg += `<text x="${m.left + bw + 10}" y="${y + 18}" class="bar-label" font-weight="700">${d.value}</text>`;
    });

    svg += `</svg>`;
    viz.innerHTML = svg;
  }

  // ---- horizontal stacked bars (used for gender x class) ----------
  function groupedHorizontal(data, keys, colorMap) {
    const w = 760, h = 520, m = { top: 20, right: 40, bottom: 50, left: 180 };
    const max  = Math.max(...data.map(d => keys.reduce((s, k) => s + (d[k] || 0), 0)));
    const rowH = (h - m.top - m.bottom) / data.length;
    let svg = `<svg viewBox="0 0 ${w} ${h}">`;

    for (let i = 0; i <= 4; i++) {
      const x = m.left + (w - m.left - m.right) * (i / 4);
      svg += `<line x1="${x}" y1="${m.top}" x2="${x}" y2="${h - m.bottom}" stroke="${css('--line-soft')}"/>`;
      svg += `<text x="${x}" y="${h - 12}" text-anchor="middle" class="axis">${Math.round(max * i / 4)}</text>`;
    }

    data.forEach((d, i) => {
      const y = m.top + i * rowH + 12;
      let cumulative = 0;
      keys.forEach(k => {
        const val = d[k] || 0;
        const bw  = (w - m.left - m.right) * (val / max);
        const x   = m.left + (w - m.left - m.right) * (cumulative / max);
        const fill = (colorMap && colorMap[k]) || PALETTE[0];
        svg += `<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(26, rowH - 22)}" rx="8" fill="${fill}"></rect>`;
        if (val > 0) {
          svg += `<text x="${x + bw / 2}" y="${y + 22}" text-anchor="middle" fill="white" font-size="13" font-weight="700">${val}</text>`;
        }
        cumulative += val;
      });
      svg += `<text x="${m.left - 14}" y="${y + 22}" text-anchor="end" class="bar-label">${d.label.replace('College ', '')}</text>`;
    });

    svg += `</svg>`;
    viz.innerHTML = svg;
    buildLegend(keys.map(k => ({ label: k, color: (colorMap && colorMap[k]) || PALETTE[0] })));
  }

  // ---- grouped vertical bars (used for closeness x struggle) ------
  function groupedBar(data, keys, colorMap) {
    const w = 760, h = 520, m = { top: 20, right: 40, bottom: 130, left: 60 };
    const max    = Math.max(...data.flatMap(d => keys.map(k => d[k] || 0)));
    const groupW = (w - m.left - m.right) / data.length;
    const barW   = groupW / (keys.length + 1);
    let svg = `<svg viewBox="0 0 ${w} ${h}">`;

    for (let i = 0; i <= 4; i++) {
      const y = h - m.bottom - (h - m.top - m.bottom) * (i / 4);
      svg += `<line x1="${m.left}" y1="${y}" x2="${w - m.right}" y2="${y}" stroke="${css('--line-soft')}"/>`;
      svg += `<text x="${m.left - 10}" y="${y + 4}" text-anchor="end" class="axis">${Math.round(max * i / 4)}</text>`;
    }

    data.forEach((d, i) => {
      keys.forEach((k, j) => {
        const val = d[k] || 0;
        const bh  = (h - m.top - m.bottom) * (val / max);
        const x   = m.left + i * groupW + j * barW + barW * .35;
        const y   = h - m.bottom - bh;
        const fill = (colorMap && colorMap[k]) || PALETTE[j];
        svg += `<rect x="${x}" y="${y}" width="${barW * .75}" height="${bh}" rx="6" fill="${fill}"></rect>`;
        if (val > 0) {
          svg += `<text x="${x + barW * .375}" y="${y - 5}" text-anchor="middle" class="bar-label" font-weight="700">${val}</text>`;
        }
      });
      const x = m.left + i * groupW + groupW / 2;
      svg += `<text x="${x}" y="${h - m.bottom + 18}" text-anchor="end" transform="rotate(-38 ${x} ${h - m.bottom + 18})" class="axis">${cleanLabel(d.label)}</text>`;
    });

    svg += `</svg>`;
    viz.innerHTML = svg;
    buildLegend(keys.map((k, i) => ({ label: k, color: (colorMap && colorMap[k]) || PALETTE[i] })));
  }

  // ---- ternary plot ------------------------------------------------
  function drawTernary(data) {
    const w = 760, h = 520;
    const A = { x: 380, y: 50,  label: 'Mentorship' };
    const B = { x: 110, y: 440, label: 'Community'  };
    const C = { x: 650, y: 440, label: 'Ministry'   };
    const maxCount = Math.max(...data.map(d => d.count));
    const point = d => ({
      x: d.mentorship * A.x + d.community * B.x + d.ministry * C.x,
      y: d.mentorship * A.y + d.community * B.y + d.ministry * C.y
    });

    let svg = `<svg viewBox="0 0 ${w} ${h}">`;
    svg += `<polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}" fill="#f8fafc" stroke="#334155" stroke-width="2"/>`;

    // gridlines
    for (let i = 1; i <= 4; i++) {
      const t = i / 5;
      svg += `<line x1="${B.x + (A.x - B.x) * t}" y1="${B.y + (A.y - B.y) * t}" x2="${C.x + (A.x - C.x) * t}" y2="${C.y + (A.y - C.y) * t}" stroke="${css('--line-soft')}"/>`;
      svg += `<line x1="${A.x + (B.x - A.x) * t}" y1="${A.y + (B.y - A.y) * t}" x2="${C.x + (B.x - C.x) * t}" y2="${C.y + (B.y - C.y) * t}" stroke="${css('--line-soft')}"/>`;
      svg += `<line x1="${A.x + (C.x - A.x) * t}" y1="${A.y + (C.y - A.y) * t}" x2="${B.x + (C.x - B.x) * t}" y2="${B.y + (C.y - B.y) * t}" stroke="${css('--line-soft')}"/>`;
    }

    svg += `<text x="${A.x}" y="${A.y - 20}" text-anchor="middle" font-weight="800" font-family="${css('--font-display')}" font-size="16" fill="#111827">Mentorship</text>`;
    svg += `<text x="${B.x - 16}" y="${B.y + 32}" text-anchor="middle" font-weight="800" font-family="${css('--font-display')}" font-size="16" fill="#111827">Community</text>`;
    svg += `<text x="${C.x + 16}" y="${C.y + 32}" text-anchor="middle" font-weight="800" font-family="${css('--font-display')}" font-size="16" fill="#111827">Ministry</text>`;

    data.forEach((d, i) => {
      const p = point(d);
      const r = 12 + 30 * Math.sqrt(d.count / maxCount);
      const angle = (i * 137.5) * (Math.PI / 180);
      const lx = p.x + Math.cos(angle) * (r + 13);
      const ly = p.y + Math.sin(angle) * (r + 13);
      svg += `<circle class="ternary-point" cx="${p.x}" cy="${p.y}" r="${r}" fill="${PALETTE[i % PALETTE.length]}" opacity="0.55" stroke="white" stroke-width="2" data-count="${d.count}" data-community="${d.communityLabel}" data-ministry="${d.ministryLabel}" data-mentorship="${d.mentorshipLabel}"/>`;
      svg += `<text x="${lx}" y="${ly}" text-anchor="middle" fill="#111827" font-size="12" font-weight="800">${d.count}</text>`;
    });

    svg += `</svg>`;
    viz.innerHTML = svg;

    legend.innerHTML = `
      <span><i class="dot" style="background:${PALETTE[0]}"></i>Bubble size = number of students</span>
      <span>Closer to a corner = stronger pull toward that support area</span>`;

    document.querySelectorAll('.ternary-point').forEach(dot => {
      dot.addEventListener('mouseenter', e => showTooltip(e,
        `<strong>${dot.dataset.count} student(s)</strong>Community: ${dot.dataset.community}<br>Ministry: ${dot.dataset.ministry}<br>Mentorship: ${dot.dataset.mentorship}`));
      dot.addEventListener('mousemove', moveTooltip);
      dot.addEventListener('mouseleave', hideTooltip);
    });
  }

  // ---- small-multiples / grouped bars by class --------------------
  // Replaces the old hard-to-read stacked-area chart for "struggles by year".
  // Each class year gets its own bar group; struggles are colored consistently.
  // ---- stacked area chart for struggles by class year -------------
  // Each struggle is a filled band; bands stack on top of each other.
  // Hover a band to see the struggle name, total, and per-year breakdown.
  function drawClassStruggleGrouped(data, keys) {
    const w = 760, h = 520, m = { top: 30, right: 30, bottom: 50, left: 50 };
    const chartW = w - m.left - m.right;
    const chartH = h - m.top - m.bottom;
    const n = data.length;

    // Find the max total across all years (for y scale)
    const max = Math.max(...data.map(d => keys.reduce((s, k) => s + (d[k] || 0), 0)));

    // x position for each class year (evenly spaced)
    const xPos = (i) => m.left + i * (chartW / (n - 1));

    // Pre-compute cumulative stacks for each year
    // stacks[ki][i] = top of band ki at year i
    const stacks = [];
    keys.forEach((k, ki) => {
      stacks[ki] = data.map((d, i) => {
        const below = ki === 0 ? 0 : stacks[ki - 1][i];
        return below + (d[k] || 0);
      });
    });

    // y pixel position for a count value
    const yPos = (val) => m.top + chartH - (val / max) * chartH;

    let svg = `<svg viewBox="0 0 ${w} ${h}">`;

    // y gridlines
    for (let i = 0; i <= 4; i++) {
      const y = m.top + chartH * (1 - i / 4);
      svg += `<line x1="${m.left}" y1="${y}" x2="${w - m.right}" y2="${y}" stroke="${css('--line-soft')}"/>`;
      svg += `<text x="${m.left - 8}" y="${y + 4}" text-anchor="end" class="axis">${Math.round(max * i / 4)}</text>`;
    }

    // x axis labels (class years)
    data.forEach((d, i) => {
      svg += `<text x="${xPos(i)}" y="${h - m.bottom + 20}" text-anchor="middle" class="axis" font-weight="700" font-size="14">${d.class}</text>`;
    });

    // Draw bands from bottom key upward so bottom band renders last (on top)
    // We reverse so higher bands don't cover lower ones visually
    [...keys].reverse().forEach((k, ri) => {
      const ki = keys.length - 1 - ri;  // original index

      // Build SVG path: trace top edge left→right, then bottom edge right→left
      let topPath  = data.map((d, i) => `${i === 0 ? 'M' : 'L'}${xPos(i)},${yPos(stacks[ki][i])}`).join(' ');
      let botPath  = data.map((d, i) => {
        const botVal = ki === 0 ? 0 : stacks[ki - 1][i];
        return `L${xPos(i)},${yPos(botVal)}`;
      }).reverse().join(' ');

      // Compute tooltip info
      const total = data.reduce((s, d) => s + (d[k] || 0), 0);
      const breakdown = data.map(d => `${d.class}: ${d[k] || 0}`).join('  |  ');

      svg += `<path
        class="area-layer"
        d="${topPath} ${botPath} Z"
        fill="${PALETTE[ki % PALETTE.length]}"
        opacity="0.82"
        data-key="${k}"
        data-total="${total}"
        data-breakdown="${breakdown}"
      />`;

      // Draw a thin line along the top edge of each band for separation
      const linePath = data.map((d, i) => `${i === 0 ? 'M' : 'L'}${xPos(i)},${yPos(stacks[ki][i])}`).join(' ');
      svg += `<path d="${linePath}" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>`;
    });

    svg += `</svg>`;
    viz.innerHTML = svg;

    buildLegend(keys.map((k, i) => ({ label: k, color: PALETTE[i % PALETTE.length] })));

    // Tooltip on hover
    document.querySelectorAll('.area-layer').forEach(layer => {
      layer.addEventListener('mouseenter', e => showTooltip(e,
        `<strong>${layer.dataset.key}</strong>Total: ${layer.dataset.total}<br>${layer.dataset.breakdown}`));
      layer.addEventListener('mousemove', moveTooltip);
      layer.addEventListener('mouseleave', hideTooltip);
    });
  }

  // ---- gender x struggle as grouped vertical bars (counts) --------
  function drawGenderStruggleCounts() {
    const data = DATA.struggle_gender;
    const keys = ["Female", "Male"];
    const w = 760, h = 520, m = { top: 20, right: 30, bottom: 130, left: 55 };
    const max = Math.max(...data.flatMap(d => keys.map(k => d[k] || 0)));
    const groupW = (w - m.left - m.right) / data.length;
    const barW = groupW / 3;

    let svg = `<svg viewBox="0 0 ${w} ${h}">`;
    for (let i = 0; i <= 4; i++) {
      const y = h - m.bottom - (h - m.top - m.bottom) * (i / 4);
      svg += `<line x1="${m.left}" y1="${y}" x2="${w - m.right}" y2="${y}" stroke="${css('--line-soft')}"/>`;
      svg += `<text x="${m.left - 10}" y="${y + 4}" text-anchor="end" class="axis">${Math.round(max * i / 4)}</text>`;
    }
    data.forEach((d, i) => {
      keys.forEach((k, j) => {
        const val = d[k] || 0;
        const bh  = (h - m.top - m.bottom) * (val / max);
        const x   = m.left + i * groupW + j * barW + barW * .5;
        const y   = h - m.bottom - bh;
        svg += `<rect x="${x}" y="${y}" width="${barW * .7}" height="${bh}" rx="6" fill="${GENDER_COLORS[k]}"></rect>`;
        if (val > 0) {
          svg += `<text x="${x + barW * .35}" y="${y - 5}" text-anchor="middle" class="bar-label" font-weight="700">${val}</text>`;
        }
      });
      const x = m.left + i * groupW + groupW / 2;
      svg += `<text x="${x}" y="${h - m.bottom + 18}" text-anchor="end" transform="rotate(-38 ${x} ${h - m.bottom + 18})" class="axis">${cleanLabel(d.label)}</text>`;
    });
    svg += `</svg>`;
    viz.innerHTML = svg;
    buildLegend([{ label: "Female", color: GENDER_COLORS.Female }, { label: "Male", color: GENDER_COLORS.Male }]);
  }

  // ---- gender x struggle as proportion within each gender ---------
  function drawProportionGender() {
    const data = DATA.struggle_gender;
    const totals = { Male: 0, Female: 0 };
    data.forEach(d => { totals.Male += d.Male; totals.Female += d.Female; });
    const transformed = data.map(d => ({
      label: d.label,
      Male:   (d.Male   / totals.Male)   * 100,
      Female: (d.Female / totals.Female) * 100
    }));

    const w = 760, h = 520, m = { top: 20, right: 30, bottom: 130, left: 55 };
    const max = 50;
    const groupW = (w - m.left - m.right) / transformed.length;
    const barW = groupW / 3;

    let svg = `<svg viewBox="0 0 ${w} ${h}">`;
    for (let i = 0; i <= 5; i++) {
      const y = h - m.bottom - (h - m.top - m.bottom) * (i / 5);
      svg += `<line x1="${m.left}" y1="${y}" x2="${w - m.right}" y2="${y}" stroke="${css('--line-soft')}"/>`;
      svg += `<text x="${m.left - 10}" y="${y + 4}" text-anchor="end" class="axis">${i * 10}%</text>`;
    }
    transformed.forEach((d, i) => {
      ["Female", "Male"].forEach((k, j) => {
        const val = d[k];
        const bh  = (h - m.top - m.bottom) * (val / max);
        const x   = m.left + i * groupW + j * barW + barW * .5;
        const y   = h - m.bottom - bh;
        svg += `<rect x="${x}" y="${y}" width="${barW * .7}" height="${bh}" rx="6" fill="${GENDER_COLORS[k]}"></rect>`;
        svg += `<text x="${x + barW * .35}" y="${y - 5}" text-anchor="middle" class="bar-label" font-weight="700">${val.toFixed(0)}%</text>`;
      });
      const x = m.left + i * groupW + groupW / 2;
      svg += `<text x="${x}" y="${h - m.bottom + 18}" text-anchor="end" transform="rotate(-38 ${x} ${h - m.bottom + 18})" class="axis">${cleanLabel(d.label)}</text>`;
    });
    svg += `</svg>`;
    viz.innerHTML = svg;
    buildLegend([{ label: "Female", color: GENDER_COLORS.Female }, { label: "Male", color: GENDER_COLORS.Male }]);
  }

  // ---- gender x confidence as proportion within gender ------------
  function drawConfidenceProportion() {
    const data = DATA.confidence_gender;
    const totals = { Male: 0, Female: 0 };
    data.forEach(d => { totals.Male += d.Male; totals.Female += d.Female; });

    const transformed = ["Female", "Male"].map(gender => {
      const row = { gender };
      data.forEach(d => { row[d.label] = (d[gender] / totals[gender]) * 100; });
      return row;
    });
    const keys = data.map(d => d.label);

    const w = 760, h = 520, m = { top: 20, right: 30, bottom: 50, left: 120 };
    const barH = (h - m.top - m.bottom) / 2;

    let svg = `<svg viewBox="0 0 ${w} ${h}">`;
    transformed.forEach((d, i) => {
      const y = m.top + i * barH + barH / 2;
      svg += `<text x="${m.left - 12}" y="${y}" text-anchor="end" class="axis" font-weight="700" font-size="16">${d.gender}</text>`;
    });
    for (let i = 0; i <= 10; i++) {
      const x = m.left + (w - m.left - m.right) * (i / 10);
      svg += `<line x1="${x}" y1="${m.top}" x2="${x}" y2="${h - m.bottom}" stroke="${css('--line-soft')}"/>`;
      svg += `<text x="${x}" y="${h - 12}" text-anchor="middle" class="axis">${i * 10}%</text>`;
    }
    transformed.forEach((d, i) => {
      let cumulative = 0;
      const y = m.top + i * barH + 10;
      keys.forEach((k, ki) => {
        const val = d[k];
        const bw  = (w - m.left - m.right) * (val / 100);
        const x   = m.left + (w - m.left - m.right) * (cumulative / 100);
        svg += `<rect x="${x}" y="${y}" width="${bw}" height="${barH - 20}" rx="8" fill="${PALETTE[ki % PALETTE.length]}"/>`;
        if (val > 8) {
          svg += `<text x="${x + bw / 2}" y="${y + (barH - 20) / 2 + 5}" text-anchor="middle" fill="white" font-size="13" font-weight="700">${val.toFixed(0)}%</text>`;
        }
        cumulative += val;
      });
    });
    svg += `</svg>`;
    viz.innerHTML = svg;
    buildLegend(keys.map((k, i) => ({ label: k, color: PALETTE[i % PALETTE.length] })));
  }

  // ---- two-panel stacked bars for the outreach question -----------
  // Mirrors the chart from the project PDF: classification on top, gender on bottom.
  function drawInvestTwoPanel() {
  const keys = DATA.invest_keys;
  const classData  = DATA.invest_class;
  const genderData = DATA.invest_gender;

  const w = 760, h = 540;
  const panelGap = 30;
  const titleH   = 22;
  const m = { top: 14, right: 30, bottom: 28, left: 130 };
  const panelH = (h - panelGap - titleH * 2) / 2;

  // Convert a row to percentages based on its own total
  function toPct(d) {
    const total = keys.reduce((s, k) => s + (d[k] || 0), 0) || 1;
    const row = { label: d.label };
    keys.forEach(k => { row[k] = (d[k] || 0) / total * 100; });
    return row;
  }

    const classDataPct  = classData.map(toPct);
    const genderDataPct = genderData.map(toPct);
  
    // All bars go to 100% so x scale is fixed
    const xScale = (w - m.left - m.right) / 100;
  
    let svg = `<svg viewBox="0 0 ${w} ${h}">`;
  
    const panel = (data, yOffset, panelTitle) => {
      let s = '';
      s += `<text x="${m.left}" y="${yOffset + 14}" font-family="${css('--font-display')}" font-weight="800" font-size="16" fill="#111827">${panelTitle}</text>`;
      const top = yOffset + titleH;
      const rowH = (panelH - m.bottom) / data.length;
  
      // x ticks at 0, 25, 50, 75, 100%
      for (let i = 0; i <= 4; i++) {
        const x = m.left + (w - m.left - m.right) * (i / 4);
        s += `<line x1="${x}" y1="${top}" x2="${x}" y2="${top + panelH - m.bottom}" stroke="${css('--line-soft')}"/>`;
        s += `<text x="${x}" y="${top + panelH - 10}" text-anchor="middle" class="axis">${i * 25}%</text>`;
      }
  
      data.forEach((d, i) => {
        const y = top + i * rowH + 6;
        let cumulative = 0;
        keys.forEach((k, ki) => {
          const pct = d[k];
          const bw  = pct * xScale;
          const x   = m.left + cumulative * xScale;
          s += `<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(18, rowH - 14)}" rx="6" fill="${PALETTE[ki % PALETTE.length]}"/>`;
          if (pct >= 8) {
            s += `<text x="${x + bw / 2}" y="${y + Math.max(18, rowH - 14) / 2 + 5}" text-anchor="middle" fill="white" font-size="12" font-weight="700">${pct.toFixed(0)}%</text>`;
          }
          cumulative += pct;
        });
        s += `<text x="${m.left - 14}" y="${y + Math.max(18, rowH - 14) / 2 + 4}" text-anchor="end" class="bar-label">${d.label.replace('College ', '')}</text>`;
      });
      return s;
    };
  
    svg += panel(classDataPct,  0,                          'By Classification');
    svg += panel(genderDataPct, panelH + titleH + panelGap, 'By Gender');
    svg += `</svg>`;
  
    viz.innerHTML = svg;
    buildLegend(keys.map((k, i) => ({ label: cleanLabel(k, 50), color: PALETTE[i % PALETTE.length] })));
  }

  // ---- 100% stacked bars for "least equipped" by org --------------
  // Replaces the previous bar chart with the version from the project PDF.
  function drawLeastByOrgStacked() {
    const data = DATA.least_org;
    const keys = DATA.least_keys;
    const w = 760, h = 520, m = { top: 20, right: 30, bottom: 70, left: 60 };
    const groupW = (w - m.left - m.right) / data.length;
    const barW   = groupW * 0.55;

    let svg = `<svg viewBox="0 0 ${w} ${h}">`;
    // y axis (0-100%)
    for (let i = 0; i <= 4; i++) {
      const y = h - m.bottom - (h - m.top - m.bottom) * (i / 4);
      svg += `<line x1="${m.left}" y1="${y}" x2="${w - m.right}" y2="${y}" stroke="${css('--line-soft')}"/>`;
      svg += `<text x="${m.left - 10}" y="${y + 4}" text-anchor="end" class="axis">${i * 25}%</text>`;
    }

    data.forEach((d, i) => {
      // Normalize each bar to 100% so we don't depend on perfectly summed inputs
      const total = keys.reduce((s, k) => s + (d[k] || 0), 0) || 1;
      const x = m.left + i * groupW + (groupW - barW) / 2;
      let cumulative = 0;
      keys.forEach((k, ki) => {
        const pct = (d[k] || 0) / total * 100;
        const bh  = (h - m.top - m.bottom) * (pct / 100);
        const yTop = h - m.bottom - (h - m.top - m.bottom) * ((cumulative + pct) / 100);
        svg += `<rect class="bar-hover" x="${x}" y="${yTop}" width="${barW}" height="${bh}" fill="${PALETTE[ki % PALETTE.length]}" data-org="${d.label}" data-key="${k}" data-pct="${pct.toFixed(0)}"/>`;
        if (pct >= 8) {
          svg += `<text x="${x + barW / 2}" y="${yTop + bh / 2 + 5}" text-anchor="middle" fill="white" font-size="12" font-weight="700">${pct.toFixed(0)}%</text>`;
        }
        cumulative += pct;
      });
      svg += `<text x="${m.left + i * groupW + groupW / 2}" y="${h - m.bottom + 22}" text-anchor="middle" class="axis" font-weight="700" font-size="14">${d.label}</text>`;
    });
    svg += `</svg>`;
    viz.innerHTML = svg;

    buildLegend(keys.map((k, i) => ({ label: k, color: PALETTE[i % PALETTE.length] })));

    document.querySelectorAll('.bar-hover').forEach(b => {
      b.addEventListener('mouseenter', e => showTooltip(e,
        `<strong>${b.dataset.key}</strong>${b.dataset.pct}%`));
      b.addEventListener('mousemove', moveTooltip);
      b.addEventListener('mouseleave', hideTooltip);
    });
  }

  // ---- inject hero + steps + footer copy from NARRATIVE -----------
  function buildPage() {
    document.getElementById("hero-eyebrow").textContent = NARRATIVE.hero.eyebrow;
    document.getElementById("hero-title").textContent   = NARRATIVE.hero.title;
    document.getElementById("hero-intro").textContent   = NARRATIVE.hero.intro;
    document.getElementById("hero-stats").innerHTML = NARRATIVE.hero.stats
      .map(s => `<div class="stat"><strong>${s.value}</strong><span>${s.label}</span></div>`)
      .join("");

    document.getElementById("steps").innerHTML = NARRATIVE.steps.map((s, i) => `
      <article class="step ${i === 0 ? 'active' : ''}" data-view="${s.view}">
        <div class="num">${s.num}</div>
        <h2>${s.h2}</h2>
        <p>${s.p}</p>
      </article>`).join("");

    document.getElementById("footer-text").textContent = NARRATIVE.footer;
  }

  // ---- scroll observer that activates each step in turn -----------
  function attachObserver() {
    const stepEls = document.querySelectorAll(".step");
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          stepEls.forEach(s => s.classList.remove("active"));
          e.target.classList.add("active");
          hideTooltip();
          viz.style.opacity = 0;
          viz.style.transform = 'translateY(12px)';
          setTimeout(() => {
            render(e.target.dataset.view);
            viz.style.opacity = 1;
            viz.style.transform = 'translateY(0)';
          }, 220);
        }
      });
    }, { threshold: .62 });
    stepEls.forEach(s => obs.observe(s));
  }

  // ---- self-checks (lightweight) ----------------------------------
  function runTests() {
    console.assert(DATA.struggle.reduce((s, d) => s + d.value, 0) === 94, "struggle totals should equal 94");
    console.assert(DATA.gender_class.length === 4, "gender_class covers freshman through senior");
    console.assert(DATA.friend_struggle[0]["Very Connected"] !== undefined, "friend_struggle uses new legend keys");
    console.assert(NARRATIVE.steps.length === 11, "11 narrative steps expected");
    console.assert(Object.keys(CHART_TITLES).every(k => CHART_TITLES[k].length === 2), "every chart title has title + subtitle");
  }

  // ---- boot --------------------------------------------------------
  buildPage();
  attachObserver();
  runTests();
  render(NARRATIVE.steps[0].view);
  </script>
